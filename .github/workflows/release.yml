name: Release Builds

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'http/assets/**'
      - 'Dockerfile'
      - 'build_across'
      - 'release'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.2'
          cache: true

      - name: Prepare release version
        shell: bash
        run: |
          version="0.0.${GITHUB_RUN_NUMBER}"
          short_sha="${GITHUB_SHA::7}"
          echo "version=${version}" >> "${GITHUB_ENV}"
          echo "tag_name=main-${GITHUB_RUN_NUMBER}-${short_sha}" >> "${GITHUB_ENV}"

      - name: Download dependencies
        run: go mod download

      - name: Compile packages
        shell: bash
        run: go test -run '^$' $(go list ./... | grep -v /tests)

      - name: Build release binaries
        shell: bash
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/386"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            package_os="${os}"
            if [ "${os}" = "darwin" ]; then
              package_os="macos"
            fi

            output="dist/logdy_${package_os}_${arch}"
            if [ "${os}" = "windows" ]; then
              output="${output}.exe"
            fi

            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build \
              -trimpath \
              -ldflags "-s -w -X 'main.Version=${version}'" \
              -o "${output}" .
          done

      - name: Package release artifacts
        shell: bash
        run: |
          mkdir -p release
          for binary in dist/logdy_*; do
            name="$(basename "${binary}")"
            if [[ "${name}" == *.exe ]]; then
              base="${name%.exe}"
              zip -j "release/${base}.zip" "${binary}"
            else
              tar -C dist -czf "release/${name}.tar.gz" "${name}"
            fi
          done

          cd release
          sha256sum * > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Logdy Core ${{ env.version }}
          body: |
            Automated release for `${{ github.sha }}` from the `main` branch.
          files: release/*
